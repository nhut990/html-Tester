<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>HTML Tester</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: #f4f4f4;
  }
  .container {
    display: flex;
    height: 100vh;
  }
  .pane {
    flex: 1;
    height: 100%;
    display: flex;
    flex-direction: column;
  }
  .pane-left {
    border-right: 2px solid #ccc;
  }
  .toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: #fff;
    border-bottom: 1px solid #ddd;
  }
  .toolbar h1 {
    font-size: 18px;
    margin: 0;
    flex: 1;
    color: #333;
  }
  button {
    border: none;
    padding: 10px 20px;
    font-size: 15px;
    font-weight: bold;
    border-radius: 4px;
    cursor: pointer;
    color: #fff;
  }
  .btn-run { background: #2ea44f; }
  .btn-run:hover { background: #26913f; }
  .btn-clear { background: #e74c3c; }
  .btn-clear:hover { background: #c0392b; }

  #editor {
    width: 100%;
    flex: 1;
    border: none;
    resize: none;
    padding: 16px;
    font-family: "Consolas", "Courier New", monospace;
    font-size: 15px;
    line-height: 1.5;
    outline: none;
  }
  #preview {
    width: 100%;
    height: 100%;
    border: none;
    background: #fff;
  }
</style>
</head>
<body>

<div class="container">
  <div class="pane pane-left">
    <div class="toolbar">
      <h1>HTML Tester</h1>
      <button class="btn-run" onclick="runCode()">▶ Run</button>
      <button class="btn-clear" onclick="clearCode()">🗑 Xóa</button>
    </div>
    <textarea id="editor" spellcheck="false">&lt;!DOCTYPE html&gt;
&lt;html&gt;
&lt;head&gt;
&lt;title&gt;HTML Tester Online&lt;/title&gt;
&lt;style&gt;
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #2c3e50, #3a4a63, #2c3e50);
    background-size: 400% 400%;
    animation: gradientMove 12s ease infinite;
    font-family: "Segoe UI", Arial, sans-serif;
    overflow: hidden;
  }
  @keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  .box {
    text-align: center;
  }
  h1 {
    color: #eef1f5;
    font-size: 44px;
    margin: 0;
    letter-spacing: 1.5px;
    text-shadow: 0 0 6px rgba(120,170,220,0.35);
    animation: glow 3s ease-in-out infinite alternate;
  }
  @keyframes glow {
    from { text-shadow: 0 0 6px rgba(120,170,220,0.3); }
    to   { text-shadow: 0 0 14px rgba(120,170,220,0.55); }
  }
  p {
    margin-top: 16px;
    font-size: 18px;
    color: #cfd6e0;
    opacity: 0;
    animation: fadeIn 1.8s ease forwards 0.5s;
  }
  @keyframes fadeIn {
    to { opacity: 1; transform: translateY(0); }
    from { opacity: 0; transform: translateY(10px); }
  }
  p span {
    font-weight: bold;
    color: #7fb2e0;
  }
&lt;/style&gt;
&lt;/head&gt;
&lt;body&gt;

&lt;div class="box"&gt;
  &lt;h1&gt;HTML Tester Online&lt;/h1&gt;
  &lt;p&gt;được tạo bởi &lt;span&gt;Đặng Minh Nhựt&lt;/span&gt;&lt;/p&gt;
&lt;/div&gt;

&lt;/body&gt;
&lt;/html&gt;</textarea>
  </div>
  <div class="pane">
    <iframe id="preview"></iframe>
  </div>
</div>

<script>
  function runCode() {
    const code = document.getElementById('editor').value;
    const preview = document.getElementById('preview');
    // Dùng srcdoc thay vì document.write để đảm bảo luôn cập nhật đúng nội dung mới
    preview.srcdoc = code;
  }

  function clearCode() {
    document.getElementById('editor').value = '';
    const preview = document.getElementById('preview');
    preview.srcdoc = '';
  }

  // Chạy sẵn nội dung mẫu khi mở trang
  window.onload = runCode;
</script>

</body>
</html>
