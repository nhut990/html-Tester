<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>HTML Tester</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: #f4f4f4;
  }
  .container {
    display: flex;
    height: 100vh;
  }
  .pane {
    flex: 1;
    height: 100%;
    display: flex;
    flex-direction: column;
  }
  .pane-left {
    border-right: 2px solid #ccc;
  }
  .toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: #fff;
    border-bottom: 1px solid #ddd;
  }
  .toolbar h1 {
    font-size: 18px;
    margin: 0;
    flex: 1;
    color: #333;
  }
  button {
    border: none;
    padding: 10px 20px;
    font-size: 15px;
    font-weight: bold;
    border-radius: 4px;
    cursor: pointer;
    color: #fff;
  }
  .btn-run { background: #2ea44f; }
  .btn-run:hover { background: #26913f; }
  .btn-clear { background: #e74c3c; }
  .btn-clear:hover { background: #c0392b; }
  #editor {
    width: 100%;
    flex: 1;
    border: none;
    resize: none;
    padding: 16px;
    font-family: "Consolas", "Courier New", monospace;
    font-size: 15px;
    line-height: 1.5;
    outline: none;
  }
  #preview {
    width: 100%;
    height: 100%;
    border: none;
    background: #fff;
  }
</style>
</head>
<body>
<div class="container">
  <div class="pane pane-left">
    <div class="toolbar">
      <h1>HTML Tester</h1>
      <button class="btn-run" onclick="runCode()">▶ Run</button>
      <button class="btn-clear" onclick="clearCode()">🗑 Xóa</button>
    </div>
    <textarea id="editor" spellcheck="false">&lt;!DOCTYPE html&gt;
&lt;html&gt;
&lt;head&gt;
    &lt;meta charset="UTF-8"&gt;
    &lt;title&gt;Test&lt;/title&gt;
&lt;/head&gt;
&lt;body style="display:flex; justify-content:center; align-items:center; height:100vh; margin:0; font-family:sans-serif;"&gt;
    &lt;div style="text-align:center;"&gt;
        &lt;h1 style="font-size:2rem;"&gt;HTML Tester Online&lt;/h1&gt;
        &lt;p style="font-size:1.2rem; color:#333;"&gt;được tạo bởi &lt;strong&gt;Minh Nhựt&lt;/strong&gt;&lt;/p&gt;
    &lt;/div&gt;
&lt;/body&gt;
&lt;/html&gt;</textarea>
  </div>
  <div class="pane">
    <iframe id="preview"></iframe>
  </div>
</div>
<script>
  function runCode() {
    const code = document.getElementById('editor').value;
    const preview = document.getElementById('preview');
    // Dùng srcdoc thay vì document.write để đảm bảo luôn cập nhật đúng nội dung mới
    preview.srcdoc = code;
  }
  function clearCode() {
    document.getElementById('editor').value = '';
    const preview = document.getElementById('preview');
    preview.srcdoc = '';
  }
  // Chạy sẵn nội dung mẫu khi mở trang
  window.onload = runCode;
</script>
</body>
</html>
